<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 240" width="860" height="240" role="img" aria-label="Terrasentry">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#10182E"/>
      <stop offset="1" stop-color="#0A0F1F"/>
    </linearGradient>
    <radialGradient id="core" cx="42%" cy="38%" r="65%">
      <stop offset="0" stop-color="#FFE0B2"/>
      <stop offset="0.45" stop-color="#FF8C2A"/>
      <stop offset="1" stop-color="#E04E00"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#FF8C28" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#FF8C28" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="word" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#FFB256"/>
      <stop offset="1" stop-color="#FF6B1A"/>
    </linearGradient>
  </defs>

  <!-- space panel -->
  <rect x="2" y="2" width="856" height="236" rx="22"
        fill="url(#bg)" stroke="#FF8C42" stroke-opacity="0.25" stroke-width="1.5"/>

  <!-- stars -->
  <g fill="#FFFFFF">
    <circle cx="40"  cy="40"  r="1.4" opacity="0.85"/>
    <circle cx="80"  cy="165" r="1.0" opacity="0.6"/>
    <circle cx="185" cy="50"  r="1.0" opacity="0.7"/>
    <circle cx="150" cy="190" r="1.3" opacity="0.6"/>
    <circle cx="245" cy="30"  r="1.0" opacity="0.5"/>
    <circle cx="305" cy="205" r="1.4" opacity="0.7"/>
    <circle cx="365" cy="45"  r="1.0" opacity="0.6"/>
    <circle cx="430" cy="200" r="1.2" opacity="0.5"/>
    <circle cx="505" cy="35"  r="1.3" opacity="0.7"/>
    <circle cx="565" cy="210" r="1.0" opacity="0.5"/>
    <circle cx="705" cy="195" r="1.2" opacity="0.6"/>
    <circle cx="775" cy="60"  r="1.0" opacity="0.6"/>
    <circle cx="815" cy="155" r="1.4" opacity="0.7"/>
    <circle cx="680" cy="115" r="1.0" opacity="0.4"/>
  </g>
  <g fill="#FFB861">
    <circle cx="62"  cy="92"  r="1.7" opacity="0.9"/>
    <circle cx="625" cy="42"  r="1.6" opacity="0.85"/>
  </g>

  <!-- orbital sentry mark, centred at 130,120 -->
  <circle cx="130" cy="120" r="66" fill="url(#glow)"/>

  <!-- radar ring -->
  <circle cx="130" cy="120" r="52" fill="none"
          stroke="#FF8A3D" stroke-opacity="0.22" stroke-width="1.5" stroke-dasharray="2 6"/>

  <!-- orbit + sentry satellite -->
  <g transform="rotate(-22 130 120)">
    <polygon points="210,120 150,113 150,127" fill="#FF8C2A" opacity="0.16"/>
    <ellipse cx="130" cy="120" rx="84" ry="30" fill="none"
             stroke="#FF8C42" stroke-opacity="0.75" stroke-width="2"/>
    <circle cx="214" cy="120" r="5.5" fill="#FFC371"/>
  </g>

  <!-- core planet -->
  <circle cx="130" cy="120" r="36" fill="url(#core)"/>
  <ellipse cx="118" cy="108" rx="12" ry="9" fill="#FFFFFF" opacity="0.30"/>

  <!-- wordmark -->
  <text x="276" y="134"
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="62" font-weight="800" letter-spacing="1">
    <tspan fill="#EEF2FF">TERRA</tspan><tspan fill="url(#word)">SENTRY</tspan>
  </text>
  <text x="278" y="170"
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="15" font-weight="600" letter-spacing="4" fill="#7E93BE">CLOUD LOCK-IN SENTRY · TERRAFORM</text>
</svg>
